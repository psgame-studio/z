<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub 3D Model Importer</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0d1117;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: #c9d1d9;
    overflow: hidden;
  }
  #canvas-container {
    position: fixed;
    inset: 0;
  }
  #canvas-container canvas {
    display: block;
  }

  #panel {
    position: fixed;
    top: 16px;
    left: 16px;
    width: 360px;
    max-width: calc(100vw - 32px);
    background: rgba(22, 27, 34, 0.92);
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 16px;
    backdrop-filter: blur(6px);
    z-index: 10;
  }
  #panel h1 {
    font-size: 15px;
    margin: 0 0 12px;
    background: linear-gradient(90deg, #58a6ff, #3fb950);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #8b949e;
    margin-bottom: 6px;
  }
  input[type=text] {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #c9d1d9;
    font-family: 'SFMono-Regular', Consolas, monospace;
    font-size: 12px;
    padding: 10px;
    margin-bottom: 10px;
  }
  input[type=text]:focus { outline: none; border-color: #58a6ff; }

  button {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    padding: 11px;
    cursor: pointer;
    background: linear-gradient(90deg, #3b82f6, #60a5fa);
    color: #fff;
    margin-bottom: 10px;
  }
  button:hover { filter: brightness(1.08); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  #status {
    font-size: 12px;
    color: #8b949e;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px;
    min-height: 18px;
    word-break: break-word;
  }
  #status.success { color: #3fb950; border-color: #3fb95055; }
  #status.error { color: #f85149; border-color: #f8514955; }
  #status.warn { color: #d29922; border-color: #d2992255; }

  #controls-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  #controls-row button {
    margin-bottom: 0;
    flex: 1;
    background: #21262d;
    color: #c9d1d9;
    font-size: 11px;
    padding: 8px;
  }
  #controls-row button:hover { background: #262c34; filter: none; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="panel">
  <h1>GitHub → 3D Model Importer</h1>
  <label for="urlInput">GitHub File URL (.glb / .gltf / .fbx / .obj)</label>
  <input type="text" id="urlInput" placeholder="https://github.com/user/repo/blob/main/model.glb">
  <button id="importBtn">Import Model</button>
  <div id="status">Paste a GitHub link and click Import.</div>
  <div id="controls-row">
    <button id="resetCamBtn">Reset View</button>
    <button id="clearBtn">Clear Scene</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

const MAX_RECOMMENDED_MB = 4;

// ---------- Scene setup ----------
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(4, 3, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 0.5, 0);

// Lighting
const hemi = new THREE.HemisphereLight(0xffffff, 0x222233, 1.2);
scene.add(hemi);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// Ground grid so imported models have a visible reference
const grid = new THREE.GridHelper(20, 20, 0x30363d, 0x21262d);
scene.add(grid);

// Placeholder cube so you see something before importing anything
const placeholder = new THREE.Mesh(
  new THREE.BoxGeometry(1, 1, 1),
  new THREE.MeshStandardMaterial({ color: 0x58a6ff, wireframe: true })
);
placeholder.position.y = 0.5;
scene.add(placeholder);

let currentModel = null;

function animate() {
  requestAnimationFrame(animate);
  if (!currentModel) placeholder.rotation.y += 0.005;
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- GitHub -> raw link ----------
function githubToRawUrl(url) {
  try {
    const u = new URL(url.trim());
    if (u.hostname === 'raw.githubusercontent.com') return url.trim();
    if (u.hostname !== 'github.com') return null;

    const parts = u.pathname.split('/').filter(Boolean);
    if (parts.length < 4) return null;

    const [user, repo, type, ...rest] = parts;
    if (type !== 'blob' && type !== 'raw') return null;

    let branch, filePath;
    if (rest[0] === 'refs' && rest[1] === 'heads') {
      branch = rest[2];
      filePath = rest.slice(3).join('/');
    } else {
      branch = rest[0];
      filePath = rest.slice(1).join('/');
    }
    if (!branch || !filePath) return null;

    return `https://raw.githubusercontent.com/${user}/${repo}/${branch}/${filePath}`;
  } catch (e) {
    return null;
  }
}

function getLoaderForUrl(url) {
  const ext = url.split('.').pop().toLowerCase().split(/[?#]/)[0];
  switch (ext) {
    case 'glb':
    case 'gltf':
      return { loader: new GLTFLoader(), type: 'gltf' };
    case 'fbx':
      return { loader: new FBXLoader(), type: 'fbx' };
    case 'obj':
      return { loader: new OBJLoader(), type: 'obj' };
    default:
      return null;
  }
}

async function checkFileSizeMB(url) {
  try {
    const res = await fetch(url, { method: 'HEAD' });
    const bytes = res.headers.get('content-length');
    if (!bytes) return null;
    return (parseInt(bytes, 10) / (1024 * 1024)).toFixed(2);
  } catch (e) {
    return null;
  }
}

function frameObject(object) {
  const box = new THREE.Box3().setFromObject(object);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const dist = maxDim * 2;

  camera.position.set(center.x + dist, center.y + dist * 0.6, center.z + dist);
  controls.target.copy(center);
  controls.update();
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}

async function importFromGithub(githubUrl) {
  const importBtn = document.getElementById('importBtn');
  importBtn.disabled = true;

  const rawUrl = githubToRawUrl(githubUrl);
  if (!rawUrl) {
    setStatus('❌ Invalid GitHub URL — check the format.', 'error');
    importBtn.disabled = false;
    return;
  }

  const loaderInfo = getLoaderForUrl(rawUrl);
  if (!loaderInfo) {
    setStatus('❌ Unsupported file type. Use .glb, .gltf, .fbx, or .obj.', 'error');
    importBtn.disabled = false;
    return;
  }

  setStatus('Checking file size…');
  const sizeMB = await checkFileSizeMB(rawUrl);
  if (sizeMB && sizeMB > MAX_RECOMMENDED_MB) {
    setStatus(`⚠️ ${sizeMB}MB — above the ${MAX_RECOMMENDED_MB}MB recommended limit. Loading anyway…`, 'warn');
  } else {
    setStatus('Loading model…');
  }

  const { loader, type } = loaderInfo;

  loader.load(
    rawUrl,
    (result) => {
      // Remove previous model/placeholder
      if (currentModel) scene.remove(currentModel);
      scene.remove(placeholder);

      const model = type === 'gltf' ? result.scene : result;
      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });

      scene.add(model);
      currentModel = model;
      frameObject(model);

      setStatus(`✅ Imported (${type.toUpperCase()}${sizeMB ? ', ' + sizeMB + 'MB' : ''})`, 'success');
      importBtn.disabled = false;
    },
    (xhr) => {
      if (xhr.total) {
        setStatus(`Loading: ${((xhr.loaded / xhr.total) * 100).toFixed(0)}%`);
      }
    },
    (error) => {
      console.error(error);
      setStatus('❌ Failed to load model. Check the console for details.', 'error');
      importBtn.disabled = false;
    }
  );
}

// ---------- UI wiring ----------
document.getElementById('importBtn').addEventListener('click', () => {
  const url = document.getElementById('urlInput').value;
  if (!url.trim()) {
    setStatus('❌ Paste a GitHub URL first.', 'error');
    return;
  }
  importFromGithub(url);
});

document.getElementById('urlInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('importBtn').click();
});

document.getElementById('resetCamBtn').addEventListener('click', () => {
  if (currentModel) frameObject(currentModel);
  else {
    camera.position.set(4, 3, 6);
    controls.target.set(0, 0.5, 0);
    controls.update();
  }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (currentModel) {
    scene.remove(currentModel);
    currentModel = null;
    scene.add(placeholder);
    setStatus('Scene cleared. Paste a GitHub link and click Import.');
  }
});
</script>

</body>
</html>
